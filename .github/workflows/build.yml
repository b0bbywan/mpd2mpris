name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake intltool python3

      - name: Autogen
        run: ./autogen.sh --sysconfdir=/etc

      - name: Build
        run: make

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp src/mpDris2 release/
          cp src/mpDris2.service release/
          cp src/org.mpris.MediaPlayer2.mpd.service release/
          cp src/mpDris2.conf release/
          cp src/mpdris2.desktop release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mpDris2
          path: release/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: mpDris2
          path: release

      - name: Create release archive
        run: tar czf mpDris2-${GITHUB_REF_NAME#v}.tar.gz -C release .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: mpDris2-*.tar.gz
          generate_release_notes: true
