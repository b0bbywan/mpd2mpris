# Copy this to /etc/mpDris2/mpDris2.conf or
# ~/.config/mpDris2/mpDris2.conf. Default values are shown here,
# commented out.

[Connection]
# You can also export $MPD_HOST and/or $MPD_PORT to change the server.
#host = localhost
#port = 6600
#password =

[Library]
# Required for cover-art resolution when MPD is remote. Auto-detected
# over a local Unix socket connection.
#music_dir =
# Regex matched against filenames in the song's directory (step 2 of
# the cover pipeline). Useful for non-standard names like folder.jpg.
#cover_regex = ^(album|cover|\.?folder|front).*\.(gif|jpe?g|png|webp|bmp)$

[Cover]
# Remote cover-art sources (step 5), as an ordered, comma-separated list —
# the order is the lookup priority, and a source not listed is off. Valid:
# musicbrainz, itunes, deezer. Unset = none. MusicBrainz/CAA needs the
# [cover] extra; iTunes/Deezer don't.
#sources = musicbrainz, itunes, deezer

[Bling]
# Fire a libnotify bubble on every track change. ``[Notify] notify``
# is the preferred location; this name is kept as a legacy fallback
# under its historical ``notification`` spelling.
#notification = True
# Also notify when the player is paused (default: only when playing).
#notify_paused = False
# CD-like Previous: if elapsed >= 3 s, restart the current track
# instead of jumping to the previous one.
#cdprev = False

[Notify]
# Preferred location for the on/off switch above; takes precedence
# over [Bling] notification.
#notify = True
# Urgency forwarded to the notification server: 0 low, 1 normal,
# 2 critical.
#urgency = 1
# Bubble lifetime in milliseconds — -1 lets the server decide,
# 0 means "never expire".
#timeout = -1
# Format strings for the bubble. Empty = use the built-in default.
# Placeholders: %album% %title% %id% %time% %timeposition% %date%
#               %track% %disc% %artist% %albumartist% %composer%
#               %genre% %file%
#summary =
#body =
#paused_summary =
#paused_body =
